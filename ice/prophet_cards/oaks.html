<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        body {
            background: #FFECD7;
        }
        
        .card {
            margin-top: 10%;
            margin-bottom: 10%;
            outline: 5px  #004e63 solid;
            background: #008DB1;
            border-radius: 15px;
            min-height: 100vh;
            margin-left: 20%;
            margin-right: 20%;
        }

        .name {
            text-align: center;
            color: white;
            font-size: xx-large;
            font-family: Arial, Helvetica, sans-serif;
        }

        h2 {
            color: white;
            text-align: center;
            font-family:Arial, Helvetica, sans-serif
        }

        .portrait {
        border:5px white solid;
        display:block;
        margin-left:auto;
        margin-right:auto;
        }
        .stats {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align:center;
        }
        .quote {
                font-size: large;
                font-family: Georgia, 'Times New Roman', Times, serif;
                color:#FFD783;
                text-align: center;
        }
    </style>
</head>
<body>
    <div class=card>
        <header class="name"> 
            Dallin H. Oaks
        </header>
        <h2>
            18th president of the church of Jesus Christ
        </h2>
        <div>
          <img src="images/oaks.webp" class="portrait" alt="Dallin H. Oaks"> 
        </div>
        <h3 class="stats">
            Born: Aug 12, 1932 <br>
            Apostle: Apr 7, 1984 <br>
            Prophet: Oct 14, 2025
        </h3>
        <footer class=quote>
            "Adversities are temporary. <br> What is permanent is what we become by <br>the way we react to them."
        </footer>
    </div>
</body>
</html>
