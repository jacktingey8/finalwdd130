<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer{
            height:100%;
            margin-top:5%;
            margin-bottom:10%;
            margin-right:10%;
            margin-left:10%;
            border:10px darkblue solid;
            border-radius: 10%;
            background-color: white;
            overflow:hidden;
        }
        #myForm{
            height:100%;
            display:grid;
            grid-template-rows: repeat(1fr,8);
            grid-template-columns: 1fr 1fr;
            padding:20px;
            gap:10px;
            justify-content: center;
        }
        h3 {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            align-self:center;
            grid-column:1/3;
            grid-row:1;
        }
        #title{
            background-image:url("./images/jesus_feeds_5000.jpeg");
            background-position: center;
            background-size: cover;
            color: white;
            text-shadow: 2px 2px 8px black;
            width:100%;
            z-index: -5;
        }
        #scriptures{
            grid-row:8;
            grid-column:1/3;
            display:grid;
            grid-template-columns: repeat(5,1fr);
            padding:10px;
        }
        #closeBtn{
            margin-top:30px;
            margin-left:40px;
            margin-bottom:50%;
        }
       .submit-section {
        grid-column: 1 / 3; 
        display: flex;
        justify-content: center; 
        padding: 20px 0;
        }   

    </style>





</head>

<body>
    
    <div id="formContainer">
    
        <div id="title">
        <button type="button" id="closeBtn">X</button>
        <h1>Daily Feed</h1>
        <h2>Scripture a Day</h2>
        
        </div>
        
        <form id="myForm">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="submit-section">
                <button id=submit type="submit">Submit</button>
            </section>
            <div id="scriptures">
            <img id="b1" src="images/old_testament.webp">
            <img id="b2" src="images/new_testament.webp">
            <img id="b3" src="images/book_of_mormon.webp">
            <img id="b4" src="images/doctrine_and_covenants.webp">
            <img id="b5" src="images/pearl_of_great_price.webp">

        </div>
        </form>
        
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
