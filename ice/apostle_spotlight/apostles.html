<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
        display:flex;
        color: #E8ECED;
        }

        .presidency-portrait{
            border: 8px white solid;
            border-radius:100%;
        }
        .quorum-portraits{
            border: 5px white solid;
            border-radius:100%;
        }
        .grid-container{
            border-radius:10%;
            margin-top: 5%;
            margin-bottom: 5%;
            border:5px black solid;
            justify-items:center ;
            align-self: center;
            background-image:url("images/christus.webp");
            display: grid;
            padding:10px;
            column-gap: 20px;
            row-gap:5px;
            grid-template-columns:1fr 2fr 2fr 2fr 2fr 1fr;
            grid-template-rows:1fr 3fr 1fr 2fr 2fr 2fr;
            background-repeat: no-repeat; 
            background-size: cover; 
            background-position: center;
        }
        .eyring{
            grid-column: 1/3;
            grid-row:2;
            width:100;
            height:100%;
        }
        .oaks{
            transform:translateY(-40px);
            grid-column: 3/5;
            grid-row:2;
            width:100;
            height:100%;
        }
        .christofferson{
            grid-column:5/7;
            grid-row:2;
            width:100;
            height:100%;
        }
        .q1{
            grid-column:2;
            grid-row:4;
            width:60;
            height:60%;
        }
        .q2{
            grid-column:3;
            grid-row:4;
            width:60;
            height:60%;
        }
        .q3{
            grid-column:4;
            grid-row:4;
            width:60;
            height:60%;
        }
        .q4{
            grid-column:5;
            grid-row:4;
            width:60;
            height:60%;
        }
        .q5{
            grid-column:2;
            grid-row:5;
            width:60;
            height:60%;
        }
        .q6{
            grid-column:3;
            grid-row:5;
            width:60;
            height:60%;
        }
        .q7{
            grid-column:4;
            grid-row:5;
            width:60;
            height:60%;
        }
        .q8{
            grid-column:5;
            grid-row:5;
            width:60;
            height:60%;
        }
        .q9{
            grid-column:2;
            grid-row:6;
            width:60;
            height:60%;
        }
        .q10{
            grid-column:3;
            grid-row:6;
            width:60;
            height:60%;
        }
        .q11{
            grid-column:4;
            grid-row:6;
            width:60;
            height:60%;
        }
        .q12{
            grid-column:5;
            grid-row:6;
            width:60;
            height:60%;
        }

        .first-presidency{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 6vw;
            grid-row:1;
            grid-column:2/6;
        }
        .quorum-title{
            grid-row:3;
            grid-column:2/6;
            font-size: 4vw;
        }
    </style>
</head>
<body>
<background>
<div class="grid-container">
    <header class="first-presidency">
        First Presidency
    </header>

    <div class="eyring"><img src="images/eyring.webp"class="presidency-portrait"></div>
    <div class="oaks"><img src="images/oaks.webp"class="presidency-portrait"></div>
    <div class="christofferson"><img src="images/christofferson.webp"class="presidency-portrait"></div>

    <div class="quorum-title">
        Quorum of the Twelve Apostles
    </div>

    <div class="q1"><img src="images/anderson.webp"class="quorum-portraits"></div>
    <div class="q2"><img src="images/bednar.webp"class="quorum-portraits"></div>
    <div class="q3"><img src="images/causse.webp"class="quorum-portraits"></div>
    <div class="q4"><img src="images/cook.webp"class="quorum-portraits"></div>


    <div class="q5"><img src="images/gong.webp"class="quorum-portraits"></div>
    <div class="q6"><img src="images/holland.webp"class="quorum-portraits"></div>
    <div class="q7"><img src="images/kearon.webp"class="quorum-portraits"></div>
    <div class="q8"><img src="images/rasband.webp"class="quorum-portraits"></div>



    <div class="q9"><img src="images/renlund.webp"class="quorum-portraits"></div>
    <div class="q10"><img src="images/soares.webp"class="quorum-portraits"></div>
    <div class="q11"><img src="images/stevenson.webp"class="quorum-portraits"></div>
    <div class="q12"><img src="images/uchtdorf.webp"class="quorum-portraits"></div>

</div>
</div>
</background>
</body>
</html>
