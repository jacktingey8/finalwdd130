<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->

         <table class="devo-table">

            <th>Speaker</th>

            <th>Location</th>
            <th>Year</th>

          <tr>
            <td>Niehlee Muir</td>

            <td>2026</td>
          </tr>

          <tr>
            <td>Jennifer Platt</td>
            <td>Washing Their Nets</td>
            <td>BYUI</td>
            <td>2026</td>
          </tr>

          <tr>
            <td>Jennifer E. Meredith</td>
            <td>The Majesty of Your Moment </td>
            <td>BYUI</td>
            <td>2026</td>
          </tr>

         </table>
      

      <div>
      <form>
 
        <input type="text" value="Speaker" class="info">
        <input type="text" value="Title" class="info">
        <input type="text" value="Location" class="info">
        <input type="text" value="Year" class="info">

        <input type="button" value="Submit">
      </form>





      </div>
    </div>


    </main>
  </div>
